<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eco Shop</title>
    <link
      rel="shortcut icon"
      href="./assets/eco-logo.png"
      type="image/x-icon"
    />

    <!-- tailwind + dasiUI CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome  CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body>
    <nav class="">
      <div class="navbar bg-base-100 shadow-sm px-2.5">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li class="text-lg font-medium">
                <button class="active:bg-blue-500">Products</button>
              </li>
              <li class="text-lg font-medium">
                <button class="active:bg-blue-500">Cart</button>
              </li>
            </ul>
          </div>
          <h2
            class="font-bold text-lg sm:text-2xl lg:text-3xl xl:text-4xl text-info"
          >
            Eco Shop
            <span
              ><i class="fa-brands fa-opencart" style="color: rgb(0, 0, 0)"></i
            ></span>
          </h2>
        </div>
        <div class="navbar-center hidden lg:flex">
          <ul class="menu menu-horizontal space-x-5">
            <li class="font-medium">
              <button class="btn btn-ghost">Products</button>
            </li>
            <li class="font-medium">
              <button class="btn btn-ghost">Cart</button>
            </li>
          </ul>
        </div>
        <div class="navbar-end">
          <p class="flex items-center gap-2 text-xl">
            <i
              class="fa-solid fa-cart-shopping"
              style="color: rgb(0, 0, 0)"
            ></i>
            <span class="badge badge-info text-white" id="cart-count-nav"
              >+0</span
            >
          </p>
        </div>
      </div>
    </nav>

    <!-- banner area -->
    <header>
      <section
        class="min-h-screen py-20 flex items-center bg-[linear-gradient(90deg,rgba(0,0,0,0.5),rgba(0,0,0,0.5)),url('./assets/eco-banner.jpg')] bg-cover bg-right-top lg:bg-center bg-no-repeat"
      >
        <div class="text-white max-w-2xl w-[90%] p-5 lg:p-10 space-y-5">
          <h2 class="font-bold text-4xl">
            <span class="skeleton skeleton-text"
              >Elevate Your Everyday Shopping</span
            >
          </h2>
          <p class="leading-6">
            Explore a curated collection of high-quality products designed to
            bring style, comfort, and innovation to your life. Shop smarter with
            trusted brands and seamless delivery.
          </p>
          <button class="btn btn-info">Explore Products</button>
        </div>
      </section>
    </header>

    <!-- tab  -->
    <section class="max-w-7xl mx-auto w-[90%] py-10 space-x-1" id="tab-buttons">
      <button class="tab-btn btn btn-info">Products</button>
      <button class="tab-btn btn">Cart</button>
    </section>

    <!-- products -->

    <section class="max-w-7xl mx-auto w-[90%] py-20 space-y-10" id="products-area">
      <h2 class="text-center text-4xl font-bold">Our Products</h2>

      <section class="grid lg:grid-cols-[200px_1fr] gap-12 lg:gap-0 ">
        <!-- category buttons -->
    <section>

      <!-- category button loading -->
        <div class="hidden" id="category-loading">
       <div class="py-20  flex justify-center " >
    <span class="loading loading-spinner text-info loading-xl"></span>
      </div>
  </div>

          <section id="category-btns" class="space-y-1 flex flex-wrap flex-row  lg:flex-col">
          <button class="category-btn btn btn-info">All</button>
        </section>
    </section>

   <section class=" p-1">
  <div class="hidden" id="products-loading">
       <div class="py-20  flex justify-center " >
    <span class="loading loading-spinner text-info loading-xl"></span>
      </div>
  </div>
         <section
          class=" grid grid-cols-1 sm:grid-cols-2  xl:grid-cols-3 gap-5 px-2"
          id="all-products-container"
        >
      
      <!-- loading spinner -->

     
      
      </section>
   </section>
      </section>
    </section>


    <!-- cart area -->
    <section class="max-w-7xl mx-auto w-[90%] py-20 hidden" id="carts-area">
      <h2 class="text-center text-4xl font-bold">Your Cart</h2>

<div class="py-2.5 flex justify-between"><h2 class="text-2xl font-bold">Total: $<span id="cart-total">0</span></h2> <button class="btn btn-info">Order Now</button></div>
      <!-- all cart cards -->

<section class="py-10 grid md:grid-cols-2 gap-5" id="cart-store-container">


</section>


    </section>



    <!-- modal  -->
<!-- Open the modal using ID.showModal() method -->

<dialog id="card_modal" class="modal">
  <div class="modal-box">
<!-- modal data dynamic -->

<div >

    <div class="hidden" id="modal-loading">
       <div class="py-20  flex justify-center " >
    <span class="loading loading-spinner text-info loading-xl"></span>
      </div>
  </div>

  <div id="details-show">

  </div>

</div>


    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-info">Close</button>
      </form>
    </div>
  </div>
</dialog>



    <script src="./scripts/reusable.js"></script>
    <script src="./scripts/products.js"></script>
  </body>
</html>
